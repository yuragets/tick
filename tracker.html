<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos — time tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#16181d; --panel:#1e2128; --panel-2:#252a33; --line:#2f3540;
    --line-strong:#3d4552; --ink:#e8eaed; --ink-dim:#9aa1ad; --ink-mute:#646b78;
    --accent:#6ea8fe; --accent-bg:#1c2b45; --danger:#e06a6a; --danger-bg:#3a2020;
    --ok:#5ec49a; --radius:10px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:15px;line-height:1.55;
    -webkit-font-smoothing:antialiased;padding:24px 16px;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:20px;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;margin-bottom:2px;}
  h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);}
  .sub{color:var(--ink-mute);font-size:13px;margin-bottom:22px;}
  .tabs{display:flex;gap:6px;margin-bottom:20px;}
  .tab{flex:1;padding:9px 0;text-align:center;font-size:14px;border:1px solid var(--line);
    background:transparent;color:var(--ink-dim);border-radius:var(--radius);cursor:pointer;transition:.15s;}
  .tab:hover{border-color:var(--line-strong);color:var(--ink);}
  .tab.on{background:var(--panel-2);color:var(--ink);border-color:var(--line-strong);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;}
  input,select,button{font-family:inherit;font-size:14px;color:var(--ink);background:var(--panel-2);
    border:1px solid var(--line);border-radius:var(--radius);padding:9px 12px;outline:none;transition:.15s;}
  input:focus,select:focus{border-color:var(--accent);}
  input::placeholder{color:var(--ink-mute);}
  button{cursor:pointer;background:var(--panel-2);border-color:var(--line-strong);}
  button:hover{background:var(--line);}
  button:active{transform:scale(.98);}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .timer{font-family:var(--mono);font-size:38px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:1px;}
  .btn-main{padding:11px 24px;font-size:15px;font-weight:500;}
  .btn-run{background:var(--danger-bg);border-color:var(--danger);color:#f0a0a0;}
  .label{font-size:12px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .chip{padding:5px 12px;font-size:13px;border-radius:20px;cursor:pointer;border:1px solid transparent;transition:.15s;}
  .chip.sel{outline:1.5px solid currentColor;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .entry{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .entry:last-child{border-bottom:none;}
  .swatch{width:8px;height:8px;border-radius:50%;flex:none;}
  .entry-main{flex:1;min-width:0;}
  .entry-desc{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-meta{font-size:12px;color:var(--ink-mute);margin-top:1px;}
  .entry-dur{font-family:var(--mono);font-size:14px;font-variant-numeric:tabular-nums;}
  .icon-btn{padding:4px 7px;background:transparent;border:none;color:var(--ink-mute);font-size:15px;}
  .icon-btn:hover{color:var(--ink);background:transparent;}
  .tag{font-size:11px;padding:1px 7px;border-radius:5px;background:var(--panel-2);color:var(--ink-dim);border:1px solid var(--line);}
  .rng{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .rng button{padding:7px 15px;font-size:13px;}
  .rng button.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
  .stat{background:var(--panel-2);border-radius:var(--radius);padding:14px 16px;}
  .stat-label{font-size:12px;color:var(--ink-mute);}
  .stat-val{font-size:23px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--ink-dim);margin-bottom:10px;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .brk-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .bar-track{flex:1;height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;}
  .chart-wrap{position:relative;width:100%;height:260px;margin:6px 0 18px;}
  .empty{color:var(--ink-mute);font-size:13px;padding:16px 0;text-align:center;}
  .seg{display:flex;gap:4px;margin-bottom:14px;}
  .seg button{flex:1;padding:7px 0;font-size:13px;}
  .seg button.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .overlay.on{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line-strong);border-radius:14px;padding:22px;width:100%;max-width:420px;}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink-mute);margin-bottom:5px;}
  .field input,.field select{width:100%;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
  .link-btn{background:transparent;border:none;color:var(--accent);padding:6px 4px;font-size:13px;}
  .flex-between{display:flex;align-items:center;justify-content:space-between;}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span>Chronos</h1>
  <div class="sub">Personal time tracker · data stays in this browser</div>

  <div class="tabs">
    <button class="tab on" data-tab="track">Timer</button>
    <button class="tab" data-tab="report">Reports</button>
  </div>

  <!-- ===== TRACK ===== -->
  <section id="v-track">
    <div class="card">
      <div class="row" style="margin-bottom:14px;">
        <input id="desc" type="text" placeholder="What are you working on?" style="flex:2;min-width:170px;">
        <select id="proj-sel" style="flex:1;min-width:140px;"></select>
      </div>
      <div class="row" style="margin-bottom:16px;">
        <input id="tags-in" type="text" placeholder="Tags, comma-separated (optional)" style="flex:1;min-width:200px;">
      </div>
      <div class="row">
        <span id="live" class="timer">00:00:00</span>
        <button id="toggle" class="btn-main" style="margin-left:auto;">▶ Start</button>
      </div>
    </div>

    <div class="flex-between" style="margin-bottom:10px;">
      <div class="label" style="margin:0;">Projects</div>
      <div class="row" style="gap:6px;">
        <input id="new-proj" type="text" placeholder="New project" style="width:150px;padding:6px 10px;">
        <button id="add-proj" style="padding:6px 12px;">+ Add</button>
      </div>
    </div>
    <div class="chips" id="proj-chips" style="margin-bottom:22px;"></div>

    <div class="label">Entries</div>
    <div class="card" style="padding:6px 20px;">
      <div id="entries"></div>
    </div>
  </section>

  <!-- ===== REPORT ===== -->
  <section id="v-report" style="display:none;">
    <div class="rng" id="rng">
      <button data-r="today" class="on">Today</button>
      <button data-r="week">Week</button>
      <button data-r="month">Month</button>
      <button data-r="custom">Custom range</button>
    </div>
    <div class="row" id="custom-range" style="display:none;margin-bottom:14px;">
      <input id="d-from" type="date" style="flex:1;">
      <span style="color:var(--ink-mute);">→</span>
      <input id="d-to" type="date" style="flex:1;">
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">Total time</div><div class="stat-val" id="s-total">0h 0m</div></div>
      <div class="stat"><div class="stat-label">Entries</div><div class="stat-val" id="s-count">0</div></div>
      <div class="stat"><div class="stat-label">Projects</div><div class="stat-val" id="s-proj">0</div></div>
    </div>

    <div class="flex-between" style="margin-bottom:12px;">
      <div class="seg" id="chart-mode" style="margin:0;flex:none;width:auto;">
        <button data-m="proj" class="on" style="flex:none;padding:6px 14px;">By project</button>
        <button data-m="day" style="flex:none;padding:6px 14px;">By day</button>
      </div>
      <button id="export" class="link-btn">↓ Export CSV</button>
    </div>

    <div class="legend" id="legend"></div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div id="breakdown"></div>
  </section>
</div>

<!-- edit modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title">Edit entry</h3>
    <div class="field"><label>Description</label><input id="m-desc" type="text"></div>
    <div class="field"><label>Project</label><select id="m-proj"></select></div>
    <div class="field"><label>Tags (comma-separated)</label><input id="m-tags" type="text"></div>
    <div class="row" style="gap:10px;">
      <div class="field" style="flex:1;"><label>Start</label><input id="m-start" type="datetime-local"></div>
      <div class="field" style="flex:1;"><label>End</label><input id="m-end" type="datetime-local"></div>
    </div>
    <div class="modal-actions">
      <button id="m-cancel">Cancel</button>
      <button id="m-save" style="background:var(--accent-bg);border-color:var(--accent);color:var(--accent);">Save</button>
    </div>
  </div>
</div>

<script>
const PALETTE=['#6ea8fe','#5ec49a','#e0b15e','#7f77dd','#e07ba4','#e08a5e','#5ec4c4','#b06ee0'];
const KEY='chronos-v1';
let db={projects:[],entries:[],running:null};
let active=null,ticker=null,chart=null,range='today',chartMode='proj',editId=null;

/* ---------- storage ---------- */
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function loadDB(){
  try{const raw=localStorage.getItem(KEY);if(raw)db=JSON.parse(raw);}catch(e){}
  if(!db.projects||!db.projects.length)db.projects=[{id:'p1',name:'General'}];
  if(!db.entries)db.entries=[];
  active=db.projects[0].id;
}

/* ---------- helpers ---------- */
const pad=n=>String(n).padStart(2,'0');
const hms=ms=>{const s=Math.floor(ms/1000);return pad(s/3600|0)+':'+pad(s%3600/60|0)+':'+pad(s%60);};
const hm=ms=>{const m=Math.round(ms/60000);return (m/60|0)+'h '+(m%60)+'m';};
const pName=id=>{const p=db.projects.find(x=>x.id===id);return p?p.name:'—';};
const pColor=id=>{const i=db.projects.findIndex(x=>x.id===id);return PALETTE[(i<0?0:i)%PALETTE.length];};
const dtLocal=t=>{const d=new Date(t-new Date().getTimezoneOffset()*60000);return d.toISOString().slice(0,16);};

/* ---------- track view ---------- */
function renderSelect(sel,val){
  sel.innerHTML=db.projects.map(p=>`<option value="${p.id}" ${p.id===val?'selected':''}>${p.name}</option>`).join('');
}
function renderChips(){
  const el=document.getElementById('proj-chips');
  el.innerHTML=db.projects.map(p=>{const c=pColor(p.id);
    return `<span class="chip ${p.id===active?'sel':''}" data-id="${p.id}" style="background:${c}22;color:${c};">${p.name}</span>`;}).join('');
  el.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{active=ch.dataset.id;renderChips();renderSelect(document.getElementById('proj-sel'),active);});
}
function renderEntries(){
  const list=[...db.entries].sort((a,b)=>b.end-a.end).slice(0,12);
  const el=document.getElementById('entries');
  if(!list.length){el.innerHTML='<div class="empty">Nothing yet — start the timer.</div>';return;}
  el.innerHTML=list.map(e=>{const c=pColor(e.projectId);
    const tags=(e.tags||[]).map(t=>`<span class="tag">${t}</span>`).join(' ');
    return `<div class="entry">
      <span class="swatch" style="background:${c};"></span>
      <div class="entry-main">
        <div class="entry-desc">${e.desc||'No description'} ${tags}</div>
        <div class="entry-meta">${pName(e.projectId)} · ${new Date(e.start).toLocaleString('en-GB',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <span class="entry-dur">${hms(e.end-e.start)}</span>
      <button class="icon-btn" data-edit="${e.id}" title="Edit">✎</button>
      <button class="icon-btn" data-del="${e.id}" title="Delete">✕</button>
    </div>`;}).join('');
  el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{db.entries=db.entries.filter(x=>x.id!==b.dataset.del);save();renderEntries();});
  el.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEdit(b.dataset.edit));
}

/* ---------- timer ---------- */
function tick(){if(db.running)document.getElementById('live').textContent=hms(Date.now()-db.running.start);}
function updateToggle(){
  const b=document.getElementById('toggle');
  if(db.running){b.textContent='■ Stop';b.classList.add('btn-run');document.getElementById('desc').value=db.running.desc||'';document.getElementById('tags-in').value=(db.running.tags||[]).join(', ');}
  else{b.textContent='▶ Start';b.classList.remove('btn-run');}
}
function parseTags(s){return s.split(',').map(t=>t.trim()).filter(Boolean);}
function startStop(){
  if(db.running){
    const r=db.running;
    db.entries.push({id:'e'+Date.now(),desc:r.desc,projectId:r.projectId,tags:r.tags,start:r.start,end:Date.now()});
    db.running=null;clearInterval(ticker);
    document.getElementById('live').textContent='00:00:00';
    document.getElementById('desc').value='';document.getElementById('tags-in').value='';
    save();renderEntries();
  }else{
    db.running={desc:document.getElementById('desc').value,projectId:active,tags:parseTags(document.getElementById('tags-in').value),start:Date.now()};
    save();ticker=setInterval(tick,1000);tick();
  }
  updateToggle();
}

/* ---------- edit modal ---------- */
function openEdit(id){
  const e=db.entries.find(x=>x.id===id);if(!e)return;editId=id;
  document.getElementById('m-desc').value=e.desc||'';
  renderSelect(document.getElementById('m-proj'),e.projectId);
  document.getElementById('m-tags').value=(e.tags||[]).join(', ');
  document.getElementById('m-start').value=dtLocal(e.start);
  document.getElementById('m-end').value=dtLocal(e.end);
  document.getElementById('overlay').classList.add('on');
}
function saveEdit(){
  const e=db.entries.find(x=>x.id===editId);if(!e)return;
  e.desc=document.getElementById('m-desc').value;
  e.projectId=document.getElementById('m-proj').value;
  e.tags=parseTags(document.getElementById('m-tags').value);
  const s=new Date(document.getElementById('m-start').value).getTime();
  const en=new Date(document.getElementById('m-end').value).getTime();
  if(s&&en&&en>s){e.start=s;e.end=en;}
  save();closeModal();renderEntries();
}
function closeModal(){document.getElementById('overlay').classList.remove('on');editId=null;}

/* ---------- reports ---------- */
function bounds(){
  const now=new Date();let from,to=new Date(now);to.setHours(23,59,59,999);
  if(range==='today'){from=new Date(now);from.setHours(0,0,0,0);}
  else if(range==='week'){from=new Date(now);from.setDate(now.getDate()-6);from.setHours(0,0,0,0);}
  else if(range==='month'){from=new Date(now.getFullYear(),now.getMonth(),1);}
  else{const f=document.getElementById('d-from').value,t=document.getElementById('d-to').value;
    from=f?new Date(f+'T00:00:00'):new Date(0);to=t?new Date(t+'T23:59:59'):new Date(now);}
  return[from.getTime(),to.getTime()];
}
function filtered(){const[f,t]=bounds();return db.entries.filter(e=>e.start>=f&&e.start<=t);}

function renderReport(){
  const rows=filtered();let total=0;const byProj={};
  rows.forEach(e=>{const d=e.end-e.start;total+=d;byProj[e.projectId]=(byProj[e.projectId]||0)+d;});
  document.getElementById('s-total').textContent=hm(total);
  document.getElementById('s-count').textContent=rows.length;
  document.getElementById('s-proj').textContent=Object.keys(byProj).length;

  let labels,data,colors;
  if(chartMode==='proj'){
    const ids=Object.keys(byProj).sort((a,b)=>byProj[b]-byProj[a]);
    labels=ids.map(pName);data=ids.map(id=>+(byProj[id]/3600000).toFixed(2));colors=ids.map(pColor);
    document.getElementById('legend').innerHTML=ids.map(id=>`<span><i style="background:${pColor(id)}"></i>${pName(id)} · ${hm(byProj[id])}</span>`).join('')||'<span style="color:var(--ink-mute)">No data</span>';
    document.getElementById('breakdown').innerHTML=ids.map(id=>{
      const pct=total?Math.round(byProj[id]/total*100):0;
      return `<div class="brk-row"><span style="flex-basis:120px;font-size:14px;">${pName(id)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pColor(id)}"></div></div>
        <span style="font-size:13px;color:var(--ink-dim);width:34px;text-align:right;">${pct}%</span>
        <span class="entry-dur" style="width:64px;text-align:right;">${hm(byProj[id])}</span></div>`;}).join('');
  }else{
    const byDay={};rows.forEach(e=>{const k=new Date(e.start).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit'});byDay[k]=(byDay[k]||0)+(e.end-e.start);});
    const keys=Object.keys(byDay).sort((a,b)=>{const[da,ma]=a.split(/\D/),[dbb,mb]=b.split(/\D/);return (ma-mb)||(da-dbb);});
    labels=keys;data=keys.map(k=>+(byDay[k]/3600000).toFixed(2));colors=keys.map(()=>PALETTE[0]);
    document.getElementById('legend').innerHTML='<span><i style="background:'+PALETTE[0]+'"></i>Hours per day</span>';
    document.getElementById('breakdown').innerHTML=keys.map(k=>`<div class="brk-row"><span style="flex:1;font-size:14px;">${k}</span><span class="entry-dur">${hm(byDay[k])}</span></div>`).join('')||'<div class="empty">No data</div>';
  }

  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:chartMode==='proj'?'bar':'line',
    data:{labels,datasets:[{data,backgroundColor:chartMode==='proj'?colors:'rgba(110,168,254,.15)',
      borderColor:PALETTE[0],borderWidth:chartMode==='proj'?0:2,borderRadius:5,maxBarThickness:44,
      fill:chartMode!=='proj',tension:.3,pointRadius:3,pointBackgroundColor:PALETTE[0]}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>c.parsed.y+' h'}}},
      scales:{y:{beginAtZero:true,ticks:{callback:v=>v+'h',color:'#646b78'},grid:{color:'rgba(255,255,255,.05)'}},
        x:{ticks:{color:'#646b78',autoSkip:false,maxRotation:45},grid:{display:false}}}}
  });
}

function exportCSV(){
  const rows=filtered().sort((a,b)=>a.start-b.start);
  if(!rows.length){alert('No entries for the selected period');return;}
  const head=['Description','Project','Tags','Start','End','Hours'];
  const lines=[head.join(',')];
  rows.forEach(e=>{
    const cells=[e.desc||'',pName(e.projectId),(e.tags||[]).join('; '),
      new Date(e.start).toLocaleString('en-GB'),new Date(e.end).toLocaleString('en-GB'),
      ((e.end-e.start)/3600000).toFixed(2)];
    lines.push(cells.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','));
  });
  const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='chronos-'+range+'-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
}

/* ---------- tabs ---------- */
function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  document.getElementById('v-track').style.display=t==='track'?'block':'none';
  document.getElementById('v-report').style.display=t==='report'?'block':'none';
  if(t==='report')renderReport();
}

/* ---------- init ---------- */
loadDB();
renderSelect(document.getElementById('proj-sel'),active);
renderChips();renderEntries();updateToggle();
if(db.running){ticker=setInterval(tick,1000);tick();}

document.getElementById('proj-sel').onchange=e=>{active=e.target.value;renderChips();};
document.getElementById('toggle').onclick=startStop;
document.getElementById('add-proj').onclick=()=>{
  const inp=document.getElementById('new-proj');const name=inp.value.trim();if(!name)return;
  const id='p'+Date.now();db.projects.push({id,name});active=id;inp.value='';
  save();renderSelect(document.getElementById('proj-sel'),active);renderChips();
};
document.getElementById('new-proj').onkeydown=e=>{if(e.key==='Enter')document.getElementById('add-proj').click();};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
document.querySelectorAll('#rng button').forEach(b=>b.onclick=()=>{
  range=b.dataset.r;document.querySelectorAll('#rng button').forEach(x=>x.classList.toggle('on',x===b));
  document.getElementById('custom-range').style.display=range==='custom'?'flex':'none';renderReport();});
document.querySelectorAll('#chart-mode button').forEach(b=>b.onclick=()=>{
  chartMode=b.dataset.m;document.querySelectorAll('#chart-mode button').forEach(x=>x.classList.toggle('on',x===b));renderReport();});
document.getElementById('d-from').onchange=renderReport;
document.getElementById('d-to').onchange=renderReport;
document.getElementById('export').onclick=exportCSV;
document.getElementById('m-cancel').onclick=closeModal;
document.getElementById('m-save').onclick=saveEdit;
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
</script>
</body>
</html>
