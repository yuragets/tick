<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Content-Security-Policy:
    - default-src 'self'           → only same-origin resources
    - script-src 'self'            → no inline scripts or eval
    - style-src 'self' 'unsafe-inline' → Tailwind needs inline styles via the style attr
    - img-src 'self' data:         → data: URIs for SVG icons
    - connect-src 'self' localhost → fetch to the local data service (backend on another port)
    - object-src 'none'            → block Flash/PDF plugins
    - base-uri 'self'              → guard against <base> hijacking
    - form-action 'self'           → forms cannot submit to third-party sites
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <title>Tick — time tracker</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
